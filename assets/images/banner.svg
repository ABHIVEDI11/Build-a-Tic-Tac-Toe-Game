  <rect x="90" y="80" width="10" height="10" rx="2" fill="#ffd166" transform="rotate(35 95 85)"/>
  <rect x="800" y="120" width="10" height="10" rx="2" fill="#911d91" transform="rotate(-25 805 125)"/>
  <path d="M30 230 l8 -4 l8 4 l-8 4 z" fill="#ffd166"/>
  <path d="M860 250 l8 -4 l8 4 l-8 4 z" fill="#ff6b9d"/>

  <text x="450" y="58" text-anchor="middle" font-family="'Poppins', Arial, sans-serif" font-size="34" font-weight="700" fill="#2b1338">Tic-Tac-Toe</text>
  <text x="450" y="84" text-anchor="middle" font-family="'Poppins', Arial, sans-serif" font-size="14" font-weight="400" fill="#7a5c8a">HTML &#183; CSS &#183; JavaScript</text>

  <g transform="translate(330,108)">
    <rect x="0" y="0" width="240" height="240" rx="18" fill="#ffffff"/>
    <line x1="80" y1="14" x2="80" y2="226" stroke="#2b1338" stroke-width="4" stroke-linecap="round"/>
    <line x1="160" y1="14" x2="160" y2="226" stroke="#2b1338" stroke-width="4" stroke-linecap="round"/>
    <line x1="14" y1="80" x2="226" y2="80" stroke="#2b1338" stroke-width="4" stroke-linecap="round"/>
    <line x1="14" y1="160" x2="226" y2="160" stroke="#2b1338" stroke-width="4" stroke-linecap="round"/>

    <g transform="translate(40,40)">
