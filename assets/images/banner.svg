      <line x1="20" y1="-20" x2="-20" y2="20" stroke="#911d91" stroke-width="11" stroke-linecap="round"/>
      <circle cx="-7" cy="-13" r="3.2" fill="#2b1338"/>
      <circle cx="7" cy="-13" r="3.2" fill="#2b1338"/>
