      <line x1="18" y1="-18" x2="-18" y2="18" stroke="#ff6b9d" stroke-width="11" stroke-linecap="round"/>
      <circle cx="-6" cy="-12" r="3" fill="#6b1339"/>
      <circle cx="6" cy="-12" r="3" fill="#6b1339"/>
      <path d="M-6 8 Q0 13 6 8" stroke="#6b1339" stroke-width="2.2" fill="none" stroke-linecap="round"/>
