  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf2ff"/>
      <stop offset="100%" stop-color="#f3e7f9"/>
    </linearGradient>
    <linearGradient id="cupGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe27a"/>
      <stop offset="100%" stop-color="#ffc93c"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="900" height="380" rx="28" fill="url(#bg)"/>

  <circle cx="60" cy="55" r="7" fill="#ff6b9d"/>
  <circle cx="845" cy="70" r="9" fill="#06d6a0"/>
  <circle cx="820" cy="300" r="6" fill="#ffd166"/>
  <circle cx="45" cy="300" r="8" fill="#911d91"/>
  <rect x="780" y="190" width="12" height="12" rx="3" fill="#ff6b9d" transform="rotate(20 786 196)"/>
